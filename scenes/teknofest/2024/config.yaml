scene:
  scene_file: teknofest.blend
  camera_name: Camera
  bounds:
    object_name: стена
    xy_padding: 3
    z_padding: 0.55
  movable_collections:
    - move_and_change_color
    - only_move
  recolor_collection: move_and_change_color
  recolor_material_node: Principled BSDF
  recolor_material_input: Base Color
  wall_color:
    object_name: стена
    hsv:
      h: [0.5, 0.6]
      s: [0.6, 0.9]
      v: [0.5, 0.7]
  surface_hsv_adjustments:
    - object_name: стена
      node_name: Hue Saturation Value
      hue_input: 0
      hue_range: [0.45, 0.53]
      saturation_input: 1
      saturation_range: [1.1, 2.0]
      value_input: 2
      value_range: [0.9, 2.0]
  lights:
    collection_name: lights
    reference_light_names:
      - Источник-область
      - Источник-область.001
    energy_range: [75000, 175000]
    rotation_z_deg_range: [0.0, 360.0]
  mist:
    material_name: Material.001
    node_name: Principled Volume
    density_input: 2
    density_range: [0.0, 0.45]
    disabled_density: 0.05
    color_input: 0
    color_hsv:
      h: [0.5, 0.6]
      s: [0.65, 0.8]
      v: [0.15, 0.35]
    classifier_path: resources/SVM_mist_classifier_teknofest.sav
    scaler_path: resources/StandartScalerSVC_teknofest.bin

dataset:
  classes:
    - circle
    - square
    - triangle
    - hoop
    - gate
    - Target circle
  object_type_by_name:
    round: circle
    round2: circle
    sqr: square
    triu: triangle
    circle1: hoop
    circle2: hoop
    gate: gate
    TARGET: Target circle

render:
  image_width: 640
  image_height: 480
  cycles_samples: 5
  draw_debug_bboxes: true

sampling:
  num_images: 50
  seed: 42
  max_camera_attempts: 750
  max_scene_attempts: 20
  target_object_attempts: 600
  random_fallback_attempts: 150
  target_horizontal_distance_range: [2.0, 8.0]
  target_vertical_offset_range: [-0.25, 2.0]
  target_yaw_jitter_deg_range: [-8.0, 8.0]
  target_pitch_jitter_deg_range: [-5.0, 5.0]
  min_objects_in_view: 1
  min_valid_bboxes: 1
  min_bbox_width_px: 30
  min_bbox_height_px: 5
  min_camera_distance: 1.5

randomization:
  object_colors:
    - [0.0, 0.8, 0.8, 1.0]
    - [0.8, 0.0, 0.8, 1.0]
    - [0.8, 0.8, 0.0, 1.0]
    - [0.1, 0.0, 0.8, 1.0]
    - [0.0, 0.8, 0.0, 1.0]

visibility:
  mode: geometric

export:
  format: yolo_bbox
  val_size: 0.15
  test_size: 0.15
  image_prefix: img
